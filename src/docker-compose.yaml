services:
  app-jti-spot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    networks:
      - jti-spot-network
      - dokploy-network
    volumes:
      - public_data:/shared-public
    restart: always

  web-jti-spot:
    image: nginx:alpine
    volumes:
      - ./docker/nginx/jti-spot.conf:/etc/nginx/conf.d/default.conf
      - public_data:/var/www/html/public
    depends_on:
      - app-jti-spot
    networks:
      - jti-spot-network
    restart: always

networks:
  jti-spot-network:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  public_data:
