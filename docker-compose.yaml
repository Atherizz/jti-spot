services:
  app-jti-spot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-jti-spot
    ports:
      - "8080:8080" 
    env_file:
      - src/.env
    volumes:
      - ./src:/var/www/html
    command: php artisan serve --host=0.0.0.0 --port=8080
    depends_on:
      postgres-db-jti-spot:
        condition: service_healthy
    networks:
      - jti-spot-network

    restart: always

  postgres-db-jti-spot:
    image: postgres:15-alpine
    container_name: postgres-db-jti-spot
    env_file:
      - src/.env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jti-spot-network

networks:
  jti-spot-network:
    driver: bridge

volumes:
  postgres_data: